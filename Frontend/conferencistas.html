<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conferencistas · Gestión de Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <div class="brand"><span class="brand-mark">GE</span> Gestión de Eventos</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="eventos.html">Eventos</a>
      <a href="conferencistas.html" class="active">Conferencistas</a>
      <a href="inscripcion.html">Inscripciones</a>
    </div>
    <div class="nav-user">
      <span id="nombreUsuario">—</span>
      <button class="btn-logout" onclick="Sesion.cerrar()">Salir</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="eyebrow">Organización</div>
      <h1>Conferencistas</h1>
      <p>Asocia expositores a un evento específico.</p>
    </div>
    <div class="field" style="min-width:280px; margin-bottom:0;">
      <label for="selectorEvento">Evento</label>
      <select id="selectorEvento"></select>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">
        <h3 id="tituloFormConferencista">Nuevo conferencista</h3>
        <a href="#" id="cancelarEdicionConferencista" class="hint" style="display:none;">Cancelar edición</a>
      </div>
      <div class="form-error" id="errorConferencista"></div>
      <form id="formConferencista">
        <input type="hidden" id="conferencista_id_editar" value="">
        <div class="field">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Dra. Elena Ruiz" required>
        </div>
        <div class="field">
          <label for="email">Correo (opcional)</label>
          <input type="email" id="email" placeholder="elena.ruiz@tech.com">
        </div>
        <div class="field">
          <label for="bio">Biografía breve</label>
          <textarea id="bio" placeholder="Experta en IA y Machine Learning"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btnCrearConferencista">Agregar conferencista</button>
      </form>
    </div>

    <div class="card">
      <div class="card-title">
        <h3>Conferencistas del evento</h3>
        <button class="btn btn-outline btn-sm" onclick="cargarConferencistas()">Actualizar</button>
      </div>
      <table>
        <thead>
          <tr><th>Nombre</th><th>Contacto</th><th>Bio</th><th></th></tr>
        </thead>
        <tbody id="tablaConferencistas">
          <tr><td colspan="4" class="empty-state">Selecciona un evento para ver sus conferencistas.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  Sesion.requerirOrganizador();
  pintarUsuarioNavbar();

  const selectorEvento = document.getElementById("selectorEvento");
  const tablaConferencistas = document.getElementById("tablaConferencistas");
  const formConferencista = document.getElementById("formConferencista");
  const errorConferencista = document.getElementById("errorConferencista");
  const btnCrearConferencista = document.getElementById("btnCrearConferencista");
  const tituloFormConferencista = document.getElementById("tituloFormConferencista");
  const cancelarEdicionConfLink = document.getElementById("cancelarEdicionConferencista");
  const conferencistaIdEditar = document.getElementById("conferencista_id_editar");

  const parametros = new URLSearchParams(window.location.search);
  const eventoPreseleccionado = parametros.get("evento_id");

  let conferencistasCache = [];
  let modoEdicionConf = false;

  async function cargarSelectorEventos() {
    try {
      const eventos = await EventosAPI.listar();
      selectorEvento.innerHTML = eventos
        .map((ev) => `<option value="${ev.id}">${escaparHTML(ev.nombre)}</option>`)
        .join("");
      if (eventoPreseleccionado) selectorEvento.value = eventoPreseleccionado;
      if (selectorEvento.value) cargarConferencistas();
    } catch (err) {
      selectorEvento.innerHTML = `<option>Sin eventos disponibles</option>`;
    }
  }

  selectorEvento.addEventListener("change", () => { cancelarEdicionConf(); cargarConferencistas(); });

  formConferencista.addEventListener("submit", async (evento) => {
    evento.preventDefault();
    errorConferencista.classList.remove("visible");

    const evento_id = selectorEvento.value;
    if (!evento_id) {
      errorConferencista.textContent = "Primero selecciona un evento.";
      errorConferencista.classList.add("visible");
      return;
    }

    btnCrearConferencista.disabled = true;
    btnCrearConferencista.textContent = modoEdicionConf ? "Guardando…" : "Agregando…";

    const payload = {
      nombre: document.getElementById("nombre").value.trim(),
      email: document.getElementById("email").value.trim(),
      bio: document.getElementById("bio").value.trim(),
      evento_id,
    };

    try {
      let resultado;
      if (modoEdicionConf) {
        payload.id = parseInt(conferencistaIdEditar.value, 10);
        resultado = await ConferencistasAPI.editar(payload);
      } else {
        resultado = await ConferencistasAPI.crear(payload);
      }
      if (resultado.status === "ok" || resultado.id) {
        mostrarToast(modoEdicionConf ? "Conferencista actualizado" : "Conferencista agregado", "success");
        cancelarEdicionConf();
        cargarConferencistas();
      } else {
        throw new Error(resultado.mensaje || "No se pudo guardar el conferencista");
      }
    } catch (err) {
      errorConferencista.textContent = err.message;
      errorConferencista.classList.add("visible");
    } finally {
      btnCrearConferencista.disabled = false;
      btnCrearConferencista.textContent = modoEdicionConf ? "Guardar cambios" : "Agregar conferencista";
    }
  });

  async function cargarConferencistas() {
    const evento_id = selectorEvento.value;
    if (!evento_id) return;

    tablaConferencistas.innerHTML = `<tr><td colspan="4" class="empty-state">Cargando…</td></tr>`;
    try {
      const conferencistas = await ConferencistasAPI.listarPorEvento(evento_id);
      conferencistasCache = conferencistas;
      if (!conferencistas || conferencistas.length === 0) {
        tablaConferencistas.innerHTML = `<tr><td colspan="4" class="empty-state">Este evento aún no tiene conferencistas.</td></tr>`;
        return;
      }
      tablaConferencistas.innerHTML = conferencistas.map((c) => `
        <tr>
          <td style="font-weight:600;">${escaparHTML(c.nombre)}</td>
          <td>${escaparHTML(c.email || "—")}</td>
          <td class="hint">${escaparHTML(c.bio || "—")}</td>
          <td class="table-actions">
            <button class="btn btn-outline btn-sm btn-editar-conf" data-id="${c.id}">Editar</button>
            <button class="btn btn-outline btn-sm btn-eliminar-conf" data-id="${c.id}" style="color:var(--color-danger); border-color:var(--color-danger);">Eliminar</button>
          </td>
        </tr>`).join("");
    } catch (err) {
      tablaConferencistas.innerHTML = `<tr><td colspan="4" class="empty-state">${err.message}</td></tr>`;
    }
  }

  tablaConferencistas.addEventListener("click", (evento) => {
    const btnEditar = evento.target.closest(".btn-editar-conf");
    const btnEliminar = evento.target.closest(".btn-eliminar-conf");
    if (btnEditar) iniciarEdicionConf(btnEditar.dataset.id);
    if (btnEliminar) eliminarConferencista(btnEliminar.dataset.id);
  });

  function iniciarEdicionConf(id) {
    const c = conferencistasCache.find((x) => String(x.id) === String(id));
    if (!c) return;
    modoEdicionConf = true;
    conferencistaIdEditar.value = c.id;
    document.getElementById("nombre").value = c.nombre || "";
    document.getElementById("email").value = c.email || "";
    document.getElementById("bio").value = c.bio || "";
    tituloFormConferencista.textContent = "Editar conferencista";
    btnCrearConferencista.textContent = "Guardar cambios";
    cancelarEdicionConfLink.style.display = "inline";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  cancelarEdicionConfLink.addEventListener("click", (evento) => {
    evento.preventDefault();
    cancelarEdicionConf();
  });

  function cancelarEdicionConf() {
    modoEdicionConf = false;
    formConferencista.reset();
    conferencistaIdEditar.value = "";
    tituloFormConferencista.textContent = "Nuevo conferencista";
    btnCrearConferencista.textContent = "Agregar conferencista";
    cancelarEdicionConfLink.style.display = "none";
  }

  async function eliminarConferencista(id) {
    const c = conferencistasCache.find((x) => String(x.id) === String(id));
    const confirmado = await confirmarAccion(
      `¿Seguro que deseas eliminar a "${c ? c.nombre : id}" de la lista de conferencistas?`,
      "Sí, eliminar"
    );
    if (!confirmado) return;

    try {
      const resultado = await ConferencistasAPI.eliminar(id);
      if (resultado.status === "success") {
        mostrarToast(resultado.mensaje, "success");
        if (modoEdicionConf && conferencistaIdEditar.value == id) cancelarEdicionConf();
        cargarConferencistas();
      } else {
        throw new Error(resultado.mensaje || "No se pudo eliminar el conferencista");
      }
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  function escaparHTML(texto) {
    const div = document.createElement("div");
    div.textContent = texto ?? "";
    return div.innerHTML;
  }

  cargarSelectorEventos();
</script>
</body>
</html>
