<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis eventos · Gestión de Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <div class="brand"><span class="brand-mark">GE</span> Gestión de Eventos</div>
    <div class="nav-links">
      <a href="participante.html" class="active">Eventos disponibles</a>
    </div>
    <div class="nav-user">
      <span id="nombreUsuario">—</span>
      <button class="btn-logout" onclick="Sesion.cerrar()">Salir</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="eyebrow">Participante</div>
      <h1>Eventos disponibles</h1>
      <p>Inscríbete a los eventos que te interesen y revisa tu cupo. Tu código: <span class="codigo-tag" id="miCodigo">—</span></p>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">
        <h3>Próximos eventos</h3>
        <button class="btn btn-outline btn-sm" onclick="cargarEventos()">Actualizar</button>
      </div>
      <table>
        <thead>
          <tr><th>Evento</th><th>Fecha</th><th>Cupo</th><th></th></tr>
        </thead>
        <tbody id="tablaEventos">
          <tr><td colspan="4" class="empty-state">Cargando eventos…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card card-credential">
      <div class="card-title"><h3>Mis inscripciones</h3></div>
      <p class="hint">
        Puedes cancelar una inscripción hasta 4 dias antes del evento.
      </p>
      <div id="listaMisInscripciones"></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const usuarioActual = Sesion.requerirParticipante();
  pintarUsuarioNavbar();
  const miCodigoEl = document.getElementById("miCodigo");
  if (usuarioActual && usuarioActual.codigo) miCodigoEl.textContent = usuarioActual.codigo;

  const tablaEventos = document.getElementById("tablaEventos");
  const listaMisInscripciones = document.getElementById("listaMisInscripciones");
let misInscripcionesCache = [];

  function claseCupo(porcentaje) {
    if (porcentaje >= 100) return "lleno";
    if (porcentaje >= 75) return "alto";
    return "";
  }

  function estadoInscripcionEvento(ev) {
    if (!ev.fecha) return { permitido: true };
    const fechaEvento = new Date(ev.fecha.replace(" ", "T"));
    const horasRestantes = (fechaEvento.getTime() - Date.now()) / 36e5;
    if (horasRestantes < 0) return { permitido: false, texto: "Evento finalizado" };
    if (horasRestantes < 48) return { permitido: false, texto: "Inscripciones cerradas" };
    return { permitido: true };
  }

  async function cargarEventos() {
    tablaEventos.innerHTML = `<tr><td colspan="4" class="empty-state">Cargando eventos…</td></tr>`;
    try {
      const eventos = await EventosAPI.listar();
      if (!eventos || eventos.length === 0) {
        tablaEventos.innerHTML = `<tr><td colspan="4" class="empty-state">No hay eventos disponibles todavía.</td></tr>`;
        return;
      }

      tablaEventos.innerHTML = eventos.map((ev) => {
        const porcentaje = ev.cupo_total > 0 ? Math.round((ev.cupo_ocupado / ev.cupo_total) * 100) : 0;
        const lleno = porcentaje >= 100;
        const estado = estadoInscripcionEvento(ev);
        const deshabilitado = lleno || !estado.permitido;
        const textoBoton = lleno ? "Cupo lleno" : (!estado.permitido ? estado.texto : "Inscribirme");
        const fecha = ev.fecha ? new Date(ev.fecha.replace(" ", "T")).toLocaleString("es-ES", { dateStyle: "medium", timeStyle: "short" }) : "—";
        return `
          <tr>
            <td style="font-weight:600;">${escaparHTML(ev.nombre)}</td>
            <td>${fecha}</td>
            <td style="min-width:120px;">
              <div class="cupo-bar"><div class="cupo-bar-fill ${claseCupo(porcentaje)}" style="width:${Math.min(porcentaje,100)}%"></div></div>
              <div class="hint">${ev.cupo_ocupado}/${ev.cupo_total}</div>
            </td>
            <td>
              <button class="btn btn-primary btn-sm btn-inscribirme" data-id="${ev.id}" data-nombre="${escaparHTML(ev.nombre)}" ${deshabilitado ? "disabled" : ""}>
                ${textoBoton}
              </button>
            </td>
          </tr>`;
      }).join("");
    } catch (err) {
      tablaEventos.innerHTML = `<tr><td colspan="4" class="empty-state">${err.message}</td></tr>`;
    }
  }

  tablaEventos.addEventListener("click", (evento) => {
    const btn = evento.target.closest(".btn-inscribirme");
    if (btn) inscribirme(btn.dataset.id, btn.dataset.nombre);
  });

  async function inscribirme(evento_id, nombreEvento) {
    const confirmado = await confirmarAccion(`¿Confirmas tu inscripción a "${nombreEvento}"?`, "Sí, inscribirme");
    if (!confirmado) return;

    try {
      const resultado = await EventosAPI.inscribir(evento_id, usuarioActual.id);
      if (resultado.status === "success") {
        mostrarToast(resultado.mensaje, "success");
        cargarEventos();
        cargarMisInscripciones();
      } else {
        mostrarToast(resultado.mensaje || "No se pudo completar la inscripción", "error");
      }
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  function horasParaEvento(fecha) {
    if (!fecha) return Infinity;
    return (new Date(fecha.replace(" ", "T")).getTime() - Date.now()) / 36e5;
  }

  async function cargarMisInscripciones() {
    listaMisInscripciones.innerHTML = `<div class="empty-state">Cargando…</div>`;
    try {
      const inscripciones = await EventosAPI.misInscripciones();
      misInscripcionesCache = inscripciones;
      if (!inscripciones || inscripciones.length === 0) {
        listaMisInscripciones.innerHTML = `<div class="empty-state">Aún no te has inscrito a ningún evento.</div>`;
        return;
      }

  listaMisInscripciones.innerHTML = inscripciones.map((insc) => {
        const horas = horasParaEvento(insc.evento_fecha);
        const puedeCancelar = horas >= 48;
        const fecha = insc.evento_fecha ? new Date(insc.evento_fecha.replace(" ", "T")).toLocaleString("es-ES", { dateStyle: "medium", timeStyle: "short" }) : "—";
        const estadoTexto = horas < 0 ? "Evento finalizado" : (insc.presente ? "Asististe" : "Confirmada");
        const botonAcreditacion = insc.codigo_unico
          ? `<button class="btn btn-accent btn-sm btn-ver-mi-acreditacion" data-id="${insc.inscripcion_id}">★ Ver acreditación</button>`
          : "";

        return `
          <div style="padding:10px 0; border-bottom:1px solid var(--color-border);">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
              <div>
                <div style="font-weight:600;">${escaparHTML(insc.evento_nombre)}</div>
                <div class="hint">${fecha} · ${estadoTexto}</div>
              </div>
              <div style="display:flex; gap:8px;">
                ${botonAcreditacion}
                <button class="btn btn-outline btn-sm btn-cancelar-mi-insc" data-id="${insc.inscripcion_id}" data-nombre="${escaparHTML(insc.evento_nombre)}"
                  style="color:var(--color-danger); border-color:var(--color-danger);" ${puedeCancelar ? "" : "disabled title=\"Solo se puede cancelar hasta 48h antes del evento\""}>
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    } catch (err) {
      listaMisInscripciones.innerHTML = `<div class="empty-state">${err.message}</div>`;
    }
  }

listaMisInscripciones.addEventListener("click", (evento) => {
    const btnCancelar = evento.target.closest(".btn-cancelar-mi-insc");
    const btnVer = evento.target.closest(".btn-ver-mi-acreditacion");
    if (btnCancelar) cancelarMiInscripcion(btnCancelar.dataset.id, btnCancelar.dataset.nombre);
    if (btnVer) verMiAcreditacion(btnVer.dataset.id);
  });

  function verMiAcreditacion(inscripcionId) {
    const insc = misInscripcionesCache.find((i) => String(i.inscripcion_id) === String(inscripcionId));
    if (!insc) return;
    mostrarAcreditacionDigital({
      participanteNombre: usuarioActual.nombre,
      participanteCodigo: usuarioActual.codigo,
      eventoNombre: insc.evento_nombre,
      eventoFecha: insc.evento_fecha,
      codigoUnico: insc.codigo_unico,
      fechaEmision: insc.acreditacion_fecha_emision,
    });
  }

  async function cancelarMiInscripcion(inscripcion_id, nombreEvento) {
    const confirmado = await confirmarAccion(`¿Cancelar tu inscripción a "${nombreEvento}"?`, "Sí, cancelar");
    if (!confirmado) return;

    try {
      const resultado = await EventosAPI.cancelarInscripcion(inscripcion_id);
      if (resultado.status === "success") {
        mostrarToast(resultado.mensaje, "success");
        cargarMisInscripciones();
        cargarEventos();
      } else {
        throw new Error(resultado.mensaje || "No se pudo cancelar la inscripción");
      }
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  function escaparHTML(texto) {
    const div = document.createElement("div");
    div.textContent = texto ?? "";
    return div.innerHTML;
  }

  cargarEventos();
  cargarMisInscripciones();
</script>
</body>
</html>
