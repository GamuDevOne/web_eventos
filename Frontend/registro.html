<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear cuenta · Gestión de Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">GE</span>
      <div>
        <div style="font-family:var(--font-display); font-weight:700; font-size:18px;">Gestión de Eventos</div>
        <div class="hint">Congresos, seminarios y talleres</div>
      </div>
    </div>

    <h2 class="mt-0">Crear cuenta</h2>
    <p style="margin-bottom:22px;">Regístrate como organizador o como participante.</p>

    <div class="form-error" id="errorRegistro"></div>

    <form id="formRegistro">
      <div class="field">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ana Pérez" required>
      </div>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@email.com" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
      </div>
      <div class="field">
        <label for="rol">Tipo de cuenta</label>
        <select id="rol" name="rol" required>
          <option value="participante">Participante</option>
          <option value="organizador">Organizador</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btnRegistro">Crear cuenta</button>
    </form>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const formRegistro = document.getElementById("formRegistro");
  const errorBox = document.getElementById("errorRegistro");
  const btnRegistro = document.getElementById("btnRegistro");

  formRegistro.addEventListener("submit", async (evento) => {
    evento.preventDefault();
    errorBox.classList.remove("visible");
    btnRegistro.disabled = true;
    btnRegistro.textContent = "Creando cuenta…";

    const nombre = document.getElementById("nombre").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const rol = document.getElementById("rol").value;

    try {
      // Conecta con UsuariosAPI.registrar (ver TODO backend en api.js).
      const resultado = await UsuariosAPI.registrar({ nombre, email, password, rol });
      if (resultado && resultado.status === "ok") {
        mostrarToast("Cuenta creada. Ahora puedes iniciar sesión.", "success");
        setTimeout(() => (window.location.href = "login.html"), 1000);
      } else {
        throw new Error((resultado && resultado.mensaje) || "No se pudo crear la cuenta");
      }
    } catch (err) {
      errorBox.textContent = err.message || "No se pudo crear la cuenta. Intenta de nuevo.";
      errorBox.classList.add("visible");
    } finally {
      btnRegistro.disabled = false;
      btnRegistro.textContent = "Crear cuenta";
    }
  });
</script>
</body>
</html>
