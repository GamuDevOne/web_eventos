<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eventos · Gestión de Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <div class="brand"><span class="brand-mark">GE</span> Gestión de Eventos</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="eventos.html" class="active">Eventos</a>
      <a href="conferencistas.html">Conferencistas</a>
      <a href="inscripcion.html">Inscripciones</a>
    </div>
    <div class="nav-user">
      <span id="nombreUsuario">—</span>
      <button class="btn-logout" onclick="Sesion.cerrar()">Salir</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="eyebrow">Organización</div>
      <h1>Eventos</h1>
      <p>Crea congresos, seminarios o talleres y controla su cupo disponible.</p>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">
        <h3 id="tituloFormEvento">Nuevo evento</h3>
        <a href="#" id="cancelarEdicionEvento" class="hint" style="display:none;">Cancelar edición</a>
      </div>
      <div class="form-error" id="errorEvento"></div>
      <form id="formEvento">
        <input type="hidden" id="evento_id_editar" value="">
        <div class="field">
          <label for="nombre">Nombre del evento</label>
          <input type="text" id="nombre" placeholder="Congreso de Tecnología 2026" required>
        </div>
        <div class="field">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" placeholder="Breve descripción del evento"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="cupo_total">Cupo total</label>
            <input type="number" id="cupo_total" min="1" step="1" placeholder="50" required>
          </div>
          <div class="field">
            <label for="fecha">Fecha y hora</label>
            <input type="datetime-local" id="fecha" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btnCrearEvento">Crear evento</button>
      </form>
    </div>

    <div class="card">
      <div class="card-title">
        <h3>Eventos registrados</h3>
        <button class="btn btn-outline btn-sm" onclick="cargarEventos()">Actualizar</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Evento</th>
            <th>Fecha</th>
            <th>Ocupación</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tablaEventos">
          <tr><td colspan="4" class="empty-state">Cargando eventos…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  Sesion.requerirOrganizador();
  pintarUsuarioNavbar();

  const formEvento = document.getElementById("formEvento");
  const errorEvento = document.getElementById("errorEvento");
  const btnCrearEvento = document.getElementById("btnCrearEvento");
  const tablaEventos = document.getElementById("tablaEventos");
  const tituloFormEvento = document.getElementById("tituloFormEvento");
  const cancelarEdicionEventoLink = document.getElementById("cancelarEdicionEvento");
  const eventoIdEditar = document.getElementById("evento_id_editar");

  let eventosCache = [];
  let modoEdicion = false;

  formEvento.addEventListener("submit", async (evento) => {
    evento.preventDefault();
    errorEvento.classList.remove("visible");
    btnCrearEvento.disabled = true;
    btnCrearEvento.textContent = modoEdicion ? "Guardando…" : "Creando…";

    const payload = {
      nombre: document.getElementById("nombre").value.trim(),
      descripcion: document.getElementById("descripcion").value.trim(),
      cupo_total: parseInt(document.getElementById("cupo_total").value, 10),
      fecha: document.getElementById("fecha").value.replace("T", " ") + ":00",
    };

    try {
      let resultado;
      if (modoEdicion) {
        payload.id = parseInt(eventoIdEditar.value, 10);
        resultado = await EventosAPI.editar(payload);
      } else {
        resultado = await EventosAPI.crear(payload);
      }
      if (resultado.status === "ok") {
        mostrarToast(modoEdicion ? "Evento actualizado correctamente" : "Evento creado correctamente", "success");
        cancelarEdicion();
        cargarEventos();
      } else {
        throw new Error(resultado.mensaje || "No se pudo guardar el evento");
      }
    } catch (err) {
      errorEvento.textContent = err.message;
      errorEvento.classList.add("visible");
    } finally {
      btnCrearEvento.disabled = false;
      btnCrearEvento.textContent = modoEdicion ? "Guardar cambios" : "Crear evento";
    }
  });

  function claseCupo(porcentaje) {
    if (porcentaje >= 100) return "lleno";
    if (porcentaje >= 75) return "alto";
    return "";
  }

  async function cargarEventos() {
    tablaEventos.innerHTML = `<tr><td colspan="4" class="empty-state">Cargando eventos…</td></tr>`;
    try {
      const eventos = await EventosAPI.listar();
      eventosCache = eventos;
      if (!eventos || eventos.length === 0) {
        tablaEventos.innerHTML = `<tr><td colspan="4" class="empty-state">Aún no hay eventos registrados.</td></tr>`;
        return;
      }

      tablaEventos.innerHTML = eventos.map((ev) => {
        const porcentaje = ev.cupo_total > 0 ? Math.round((ev.cupo_ocupado / ev.cupo_total) * 100) : 0;
        const fecha = ev.fecha ? new Date(ev.fecha.replace(" ", "T")).toLocaleString("es-ES", { dateStyle: "medium", timeStyle: "short" }) : "—";
        return `
          <tr>
            <td>
              <div style="font-weight:600;">${escaparHTML(ev.nombre)}</div>
              <div class="hint">${ev.cupo_ocupado}/${ev.cupo_total} inscritos</div>
            </td>
            <td>${fecha}</td>
            <td style="min-width:140px;">
              <div class="cupo-bar"><div class="cupo-bar-fill ${claseCupo(porcentaje)}" style="width:${Math.min(porcentaje,100)}%"></div></div>
              <div class="hint">${porcentaje}% ocupado</div>
            </td>
            <td class="table-actions">
              <a class="btn btn-outline btn-sm" href="conferencistas.html?evento_id=${ev.id}">Conferencistas</a>
              <a class="btn btn-outline btn-sm" href="inscripcion.html?evento_id=${ev.id}">Inscribir</a>
              <button class="btn btn-outline btn-sm btn-editar-evento" data-id="${ev.id}">Editar</button>
              <button class="btn btn-outline btn-sm btn-eliminar-evento" data-id="${ev.id}" style="color:var(--color-danger); border-color:var(--color-danger);">Eliminar</button>
            </td>
          </tr>`;
      }).join("");
    } catch (err) {
      tablaEventos.innerHTML = `<tr><td colspan="4" class="empty-state">${err.message}</td></tr>`;
    }
  }

  tablaEventos.addEventListener("click", (evento) => {
    const btnEditar = evento.target.closest(".btn-editar-evento");
    const btnEliminar = evento.target.closest(".btn-eliminar-evento");
    if (btnEditar) iniciarEdicion(btnEditar.dataset.id);
    if (btnEliminar) eliminarEvento(btnEliminar.dataset.id);
  });

  function iniciarEdicion(id) {
    const ev = eventosCache.find((e) => String(e.id) === String(id));
    if (!ev) return;
    modoEdicion = true;

    eventoIdEditar.value = ev.id;
    document.getElementById("nombre").value = ev.nombre || "";
    document.getElementById("descripcion").value = ev.descripcion || "";
    document.getElementById("cupo_total").value = ev.cupo_total ?? "";
    document.getElementById("fecha").value = ev.fecha ? ev.fecha.replace(" ", "T").slice(0, 16) : "";

    tituloFormEvento.textContent = "Editar evento";
    btnCrearEvento.textContent = "Guardar cambios";
    cancelarEdicionEventoLink.style.display = "inline";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  cancelarEdicionEventoLink.addEventListener("click", (evento) => {
    evento.preventDefault();
    cancelarEdicion();
  });

  function cancelarEdicion() {
    modoEdicion = false;
    formEvento.reset();
    eventoIdEditar.value = "";
    tituloFormEvento.textContent = "Nuevo evento";
    btnCrearEvento.textContent = "Crear evento";
    cancelarEdicionEventoLink.style.display = "none";
  }

  async function eliminarEvento(id) {
    const ev = eventosCache.find((e) => String(e.id) === String(id));
    const confirmado = await confirmarAccion(
      `¿Seguro que deseas eliminar el evento "${ev ? ev.nombre : id}"? También se eliminarán sus conferencistas e inscripciones.`,
      "Sí, eliminar"
    );
    if (!confirmado) return;

    try {
      const resultado = await EventosAPI.eliminar(id);
      if (resultado.status === "success") {
        mostrarToast(resultado.mensaje, "success");
        if (modoEdicion && eventoIdEditar.value == id) cancelarEdicion();
        cargarEventos();
      } else {
        throw new Error(resultado.mensaje || "No se pudo eliminar el evento");
      }
    } catch (err) {
      mostrarToast(err.message, "error");
    }
  }

  function escaparHTML(texto) {
    const div = document.createElement("div");
    div.textContent = texto ?? "";
    return div.innerHTML;
  }

  cargarEventos();
</script>
</body>
</html>
