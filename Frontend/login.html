
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar sesión · Gestión de Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">GE</span>
      <div>
        <div style="font-family:var(--font-display); font-weight:700; font-size:18px;">Gestión de Eventos</div>
        <div class="hint">Congresos, seminarios y talleres</div>
      </div>
    </div>

    <h2 class="mt-0">Iniciar sesión</h2>
    <p style="margin-bottom:22px;">Ingresa con tu cuenta de organizador o participante.</p>

    <div class="form-error" id="errorLogin"></div>

    <form id="formLogin">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@email.com" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btnLogin">Ingresar</button>
    </form>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="registro.html">Crear una cuenta</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Si ya hay sesión guardada, saltar directo a la vista según su rol.
  const sesionExistente = Sesion.obtener();
  if (sesionExistente) {
    window.location.href = sesionExistente.rol === "organizador" ? "dashboard.html" : "participante.html";
  }

  const formLogin = document.getElementById("formLogin");
  const errorBox = document.getElementById("errorLogin");
  const btnLogin = document.getElementById("btnLogin");

  formLogin.addEventListener("submit", async (evento) => {
    evento.preventDefault();
    errorBox.classList.remove("visible");
    btnLogin.disabled = true;
    btnLogin.textContent = "Ingresando…";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const resultado = await UsuariosAPI.login(email, password);
      if (resultado && resultado.status === "ok") {
        Sesion.guardar(resultado.usuario);
        window.location.href = resultado.usuario.rol === "organizador" ? "dashboard.html" : "participante.html";
      } else {
        throw new Error((resultado && resultado.mensaje) || "Credenciales inválidas");
      }
    } catch (err) {
      errorBox.textContent = err.message || "No se pudo iniciar sesión. Intenta de nuevo.";
      errorBox.classList.add("visible");
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = "Ingresar";
    }
  });
</script>
</body>
</html>
